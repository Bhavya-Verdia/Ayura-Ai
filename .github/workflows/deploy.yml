name: Ayura AI Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single deploy method, mirroring deploy.sh: sync source to the droplet and build
# the images from source there (docker-compose.yml uses `build:`, not prebuilt
# images — the previous GHCR pull approach could never match it, and it also
# targeted the wrong path /opt/ayura instead of /opt/ayuraai).
#
# Requires one repo secret: DEPLOY_SSH_KEY = the private SSH key for the droplet.
# Host/dir are not secret (already committed in deploy.sh).
env:
  DEPLOY_HOST: 64.227.191.87
  REMOTE_DIR: /opt/ayuraai

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. CI gates — deploy only runs if these pass
  # ─────────────────────────────────────────────────────────────────
  ci-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run backend tests
        run: python -m pytest --tb=short -q

  ci-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # 2. Deploy: rsync source → droplet, build + restart there
  # ─────────────────────────────────────────────────────────────────
  deploy:
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to server
        # No --delete, and .env is never in the CI checkout, so the droplet keeps
        # its own runtime state (.env, server/uploads, seeded server/data/chromadb).
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='**/.env' \
            --exclude='client/node_modules' \
            --exclude='server/venv' \
            --exclude='server/data/chromadb' \
            --exclude='**/__pycache__' \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            ./ "root@$DEPLOY_HOST:$REMOTE_DIR/"

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new "root@$DEPLOY_HOST" \
            "cd $REMOTE_DIR \
             && docker compose build api web worker \
             && docker compose up -d --force-recreate api web worker \
             && sleep 10 \
             && curl --fail http://localhost:8000/api/health"
