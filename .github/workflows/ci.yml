name: Ayura AI CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('server/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        # E501 (line length) and intentional style choices are ignored: E701/E702
        # (one-line if/compound stmts — used in dense KB data dicts), E402
        # (module imports after sys.path bootstrap in scripts/tests), E741
        # (single-letter loop vars), E731 (lambda assignment). F-codes (unused
        # imports/vars, undefined names) and whitespace (W) stay enforced.
        run: ruff check . --select E,F,W --ignore E501,E701,E702,E402,E741,E731

      - name: Run tests
        run: python -m pytest -q --tb=short

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: /api

  e2e:
    name: Frontend — E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        # playwright.config.js auto-starts the Vite dev server; the specs mock
        # /api responses, so no backend is required.
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

        # Frontend deps are kept clean — this gate blocks merges on high+ CVEs.
      - name: npm audit (high+ severity)
        working-directory: client
        run: npm audit --audit-level=high

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

        # Blocking gate: production deps are CVE-free. CVE-2025-71176 (pytest,
        # a test-only dependency never shipped to production) is the sole
        # ignored finding — bump pytest>=9 to drop it, once pytest-asyncio
        # supports it.
      - name: pip-audit (known CVEs in Python deps)
        working-directory: server
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --ignore-vuln CVE-2025-71176
