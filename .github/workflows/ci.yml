name: Ayura AI CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('server/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --select E,F,W --ignore E501

      - name: Run tests
        run: python -m pytest -q --tb=short

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: /api

  e2e:
    name: Frontend — E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        # playwright.config.js auto-starts the Vite dev server; the specs mock
        # /api responses, so no backend is required.
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

        # Frontend deps are kept clean — this gate blocks merges on high+ CVEs.
      - name: npm audit (high+ severity)
        working-directory: client
        run: npm audit --audit-level=high

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

        # Advisory only: the LangChain/LangGraph stack currently has CVEs that
        # require major-version upgrades (0.2.x -> 1.x). Tracked as a dedicated
        # upgrade task — surfaced here so it stays visible without blocking PRs.
      - name: pip-audit (known CVEs in Python deps)
        working-directory: server
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
