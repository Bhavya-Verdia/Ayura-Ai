version: '3.8'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ayura_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - MONGO_URL=mongodb://mongodb:27017/ayura
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped
    volumes:
      - ayura_uploads:/app/uploads

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ayura_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ayura_worker
    command: ["arq", "worker.WorkerSettings"]
    environment:
      - APP_ENV=production
      - MONGO_URL=mongodb://mongodb:27017/ayura
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: ayura_mongodb
    ports:
      - "27017:27017"
    volumes:
      - ayura_mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: ayura_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: ayura_chromadb
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000" # Expose Chroma to host on 8001 to avoid conflict with backend on 8000
    volumes:
      - ayura_chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  ayura_mongo_data:
  ayura_chroma_data:
  ayura_uploads:
