services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ayura_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - MONGO_URL=mongodb://mongodb:27017/ayura
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped
    volumes:
      - ayura_uploads:/app/uploads

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ayura_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ayura_worker
    command: ["arq", "worker.WorkerSettings"]
    environment:
      - APP_ENV=production
      - MONGO_URL=mongodb://mongodb:27017/ayura
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: ayura_mongodb
    # Bound to localhost only — reachable by other containers over the compose
    # network, but never exposed publicly. Drop this block entirely if you don't
    # need host-side debugging access.
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - ayura_mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: ayura_redis
    # Localhost-only (see mongodb note).
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.6.3   # MUST match the pinned chromadb client (server/requirements.txt)
    container_name: ayura_chromadb
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "127.0.0.1:8001:8000" # Localhost-only; 8001 avoids conflict with backend on 8000
    volumes:
      - ayura_chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  ayura_mongo_data:
  ayura_chroma_data:
  ayura_uploads:
