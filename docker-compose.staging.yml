# Ayura AI — Staging stack (full parity: api + worker + web + mongo + redis + chroma)
#
#   cp .env.staging.example .env.staging   # then fill in LLM keys + generated secrets
#   docker compose -f docker-compose.staging.yml up -d --build
#   open http://localhost:8080
#
# Differences from the prod compose: secrets + LLM keys are injected via .env.staging
# (env_file), infra waits on healthchecks, ChromaDB is seeded once, and the web app is
# on :8080 to avoid clashing with anything on :80.

services:
  api:
    build: { context: ./server, dockerfile: Dockerfile }
    container_name: ayura_stg_api
    env_file: [.env.staging]
    environment:
      APP_ENV: ${APP_ENV:-staging}
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: ayura_staging
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      FRONTEND_URL: http://localhost:8080
    ports: ["8000:8000"]
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      chromadb: { condition: service_started }
    restart: unless-stopped
    volumes: [ayura_stg_uploads:/app/uploads]

  worker:
    build: { context: ./server, dockerfile: Dockerfile }
    container_name: ayura_stg_worker
    command: ["arq", "worker.WorkerSettings"]
    env_file: [.env.staging]
    environment:
      APP_ENV: ${APP_ENV:-staging}
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: ayura_staging
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      chromadb: { condition: service_started }
    restart: unless-stopped

  # One-shot: seed the knowledge base into ChromaDB, then exit.
  vector-seed:
    build: { context: ./server, dockerfile: Dockerfile }
    container_name: ayura_stg_seed
    command: ["sh", "-c", "sleep 8 && python scripts/build_vectors.py"]
    env_file: [.env.staging]
    environment:
      APP_ENV: ${APP_ENV:-staging}
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: ayura_staging
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    depends_on:
      chromadb: { condition: service_started }
    restart: "no"

  web:
    build: { context: ./client, dockerfile: Dockerfile }
    container_name: ayura_stg_web
    ports: ["8080:80"]
    depends_on: [api]
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: ayura_stg_mongo
    volumes: [ayura_stg_mongo:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ayura_stg_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.6.3   # MUST match the pinned chromadb client (server/requirements.txt) — latest causes "('_type')" protocol errors
    container_name: ayura_stg_chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes: [ayura_stg_chroma:/chroma/chroma]
    restart: unless-stopped

volumes:
  ayura_stg_mongo:
  ayura_stg_chroma:
  ayura_stg_uploads:
