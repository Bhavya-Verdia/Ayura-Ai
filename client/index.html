<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#100D09" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F1E8" media="(prefers-color-scheme: light)" />

    <!-- Primary SEO -->
    <meta name="google-site-verification" content="ObnJ5WuepcnBXzSAiIhOOsWPWI9x6wJRwSv3hfRifD0" />
    <title>Ayura AI — AI-Powered Ayurvedic Wellness Platform</title>
    <!-- Canonical is set per-page via react-helmet-async (see each page's <Helmet>),
         so sub-routes like /dosha-test self-canonicalize instead of all pointing at home. -->
    <meta name="description" content="Ayura AI is India's AI-powered Ayurvedic wellness platform. Get personalized diet plans, yoga routines, Panchakarma therapies, and herbal remedies based on your unique Prakriti (dosha profile)." />
    <meta name="keywords" content="Ayura AI, ayuraai, Ayurvedic AI, Ayurveda app India, dosha test, Prakriti analysis, personalized wellness, AI health app, yoga planner, panchakarma, herbal remedies, diet plan Ayurveda" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Ayura AI" />
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />

    <!-- Open Graph / Twitter — GLOBAL DEFAULTS only. Page-specific og:title /
         og:description / og:url (and twitter:title/description) are set per-page
         via react-helmet-async so sub-routes get correct, non-conflicting cards. -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://ayuraai.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ayura AI — AI-Powered Ayurvedic Wellness Platform" />
    <meta property="og:site_name" content="Ayura AI" />
    <meta property="og:locale" content="en_IN" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://ayuraai.in/og-image.png" />
    <meta name="twitter:site" content="@ayuraai" />


    <!-- Fonts are self-hosted (fontsource, imported in main.jsx) — same-origin
         woff2 with unicode-range subsets. No Google Fonts round-trips. -->

    <!-- PWA Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <script>
      (function() {
        try {
          var theme = localStorage.getItem('ayura_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
