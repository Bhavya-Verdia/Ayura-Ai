<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="34%" cy="26%" r="82%">
      <stop offset="0%" stop-color="#241c12"/>
      <stop offset="100%" stop-color="#100d09"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e6a23c" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#e6a23c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e6a23c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f8dc9e"/>
      <stop offset="34%"  stop-color="#f0b757"/>
      <stop offset="72%"  stop-color="#e6a23c"/>
      <stop offset="100%" stop-color="#c9781f"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="62%" r="60%">
      <stop offset="0%"   stop-color="#fff7e6"/>
      <stop offset="48%"  stop-color="#ffe6ad"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.35"/>
    </radialGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#83c896"/>
      <stop offset="100%" stop-color="#2f8f5b"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Amber glow behind flame -->
  <circle cx="50" cy="47" r="30" fill="url(#glow)"/>

  <!-- Flame -->
  <path d="M50,13 C56.5,27 67,34 67,49 C67,62 59,71 50,71 C41,71 33,62 33,49 C33,34 43.5,27 50,13 Z" fill="url(#flame)"/>
  <!-- Inner core -->
  <path d="M50,31 C54.5,40 60,44 60,52 C60,59.5 55.7,64.5 50,64.5 C44.3,64.5 40,59.5 40,52 C40,44 45.5,40 50,31 Z" fill="url(#core)"/>
  <!-- Hot spot -->
  <ellipse cx="50" cy="56" rx="4" ry="6" fill="#fff9ef"/>
  <!-- Specular highlight -->
  <path d="M43,30 C39,36 37.5,42 38,49" fill="none" stroke="#fff2d0" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

  <!-- Diya bowl / leaf base -->
  <path d="M25.5,63 C35,80 65,80 74.5,63 C71,75 61.5,83.5 50,83.5 C38.5,83.5 29,75 25.5,63 Z" fill="url(#bowl)"/>
  <path d="M28.5,64.5 C37,78 63,78 71.5,64.5" fill="none" stroke="#a6d9b6" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
</svg>
