<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tridosha Bloom: three dosha petals (Vata / Pitta / Kapha) over three
       herbal-green sepals, saffron bindu at the center. Transparent ground so
       the mark sits on any surface; colors adapt to the OS color scheme. -->
  <style>
    .sepal { fill: #256d43; }
    .vata  { fill: #8f7ce0; }
    .pitta { fill: #dd8138; }
    .kapha { fill: #55ad76; }
    .bindu { fill: #d99a2e; }
    @media (prefers-color-scheme: dark) {
      .sepal { fill: #83c896; }
      .vata  { fill: #a99aee; }
      .pitta { fill: #e0863f; }
      .kapha { fill: #5cab74; }
      .bindu { fill: #e6a23c; }
    }
  </style>
  <g class="sepal">
    <path d="M50,22 C56,30 57,37 50,45 C43,37 44,30 50,22 Z" transform="rotate(60 50 50)"/>
    <path d="M50,22 C56,30 57,37 50,45 C43,37 44,30 50,22 Z" transform="rotate(180 50 50)"/>
    <path d="M50,22 C56,30 57,37 50,45 C43,37 44,30 50,22 Z" transform="rotate(300 50 50)"/>
  </g>
  <path class="vata"  d="M50,10 C61,23 64,34 50,47 C36,34 39,23 50,10 Z"/>
  <path class="pitta" d="M50,10 C61,23 64,34 50,47 C36,34 39,23 50,10 Z" transform="rotate(120 50 50)"/>
  <path class="kapha" d="M50,10 C61,23 64,34 50,47 C36,34 39,23 50,10 Z" transform="rotate(240 50 50)"/>
  <circle class="bindu" cx="50" cy="50" r="3"/>
</svg>
