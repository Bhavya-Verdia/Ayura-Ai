server {
    listen 80;
    server_name ayuraai.in www.ayuraai.in;
    return 301 https://ayuraai.in$request_uri;
}

server {
    listen 443 ssl;
    server_name www.ayuraai.in;
    ssl_certificate     /etc/letsencrypt/live/ayuraai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayuraai.in/privkey.pem;
    return 301 https://ayuraai.in$request_uri;
}

server {
    listen 443 ssl;
    server_name ayuraai.in;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/ayuraai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayuraai.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10M;

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https: wss: ws:; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;

    # ── Landing page — pre-rendered HTML, short public cache ──────
    location = / {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files /index.html =404;
    }

    # ── Pre-rendered public SEO page — flat file so /dosha-test (no trailing
    #    slash) is served directly, matching its canonical/sitemap URL ─────────
    location = /dosha-test {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files /dosha-test.html /index.html;
    }

    # ── Auth / public pages — short cache, revalidate on revisit ──
    location ~* ^/(login|register|forgot-password|reset-password) {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Authenticated app routes — never cache HTML ───────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Uploads proxy ─────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://api:8000;
    }

    # ── Service worker — must revalidate on every update check ────
    # The assets regex below would give sw.js a 1-year immutable cache;
    # a long-cached service worker can pin clients to a dead build on
    # browsers/proxies that honor it (exact match beats the regex).
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        try_files /sw.js =404;
    }

    # ── Static assets — immutable long cache ─────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
