server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https: wss: data: 'unsafe-inline' 'unsafe-eval';" always;

    # ── Landing page — pre-rendered HTML, short public cache ──────
    # Crawlers & CDNs cache for 5 min; browsers revalidate with ETag.
    location = / {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files /index.html =404;
    }

    # ── Auth / public pages — short cache, revalidate on revisit ──
    location ~* ^/(login|register|forgot-password|reset-password) {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Authenticated app routes — never cache HTML ───────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Uploads proxy ─────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://api:8000;
    }

    # ── Static assets — immutable long cache ─────────────────────
    # Vite fingerprints all asset filenames, so 1-year cache is safe.
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
